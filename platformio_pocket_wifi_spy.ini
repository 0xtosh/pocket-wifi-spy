; Dedicated PlatformIO config for the Pocket WiFi Spy firmware.

[platformio]
default_envs = T-Dongle-S3
src_dir = examples/pocket_wifi_spy

[env:T-Dongle-S3]
platform = espressif32@6.12.0
framework = arduino
board = dongles3

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:T-Dongle-S3-Dual]
platform = espressif32@6.12.0
framework = arduino
board = dongles3-dual

[env:T-Dongle-S3-Plus]
platform = espressif32@6.12.0
framework = arduino
board = dongles3-plus